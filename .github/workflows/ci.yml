name: Publish to GHCR

# Ejecutar el workflow al hacer push a main
on:
  push:
    branches: [ "main" ]

# Permisos CRUCIALES para usar GITHUB_TOKEN y poder escribir en GHCR
permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # 1. Configurar Java para correr tus pruebas antes de crear la imagen
      - name: Configurar Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Asegúrate de que coincida con tu proyecto
          distribution: 'temurin'
          cache: 'maven'

      # 2. Forzar el uso exacto de Maven 3.9.15
      - name: Configurar Maven 3.9.15
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.15

      # 3. Validar que el código compila y pasa las pruebas
      - name: Ejecutar pruebas
        run: mvn clean verify

      # 4. Iniciar sesión en GitHub Container Registry
      - name: Iniciar sesión en GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Token automático, no requiere configuración extra

      # 5. Generar etiquetas automáticas basadas en el repositorio
      - name: Extraer metadatos para Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      # 6. Construir y publicar la imagen usando el Dockerfile de la raíz
      - name: Construir y publicar imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}